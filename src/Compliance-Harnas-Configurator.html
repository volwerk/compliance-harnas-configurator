<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compliance-Harnas Configurator · AuCx</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0a0a0a;
    --paper:#fafaf7;
    --paper-2:#f0eee6;
    --paper-3:#e8e4d6;
    --line:#1a1a1a;
    --accent:#ff6a00;
    --accent-2:#1a4bff;
    --gold:#c9a24b;
    --ok:#1f6b3a;
    --warn:#a8571c;
    --risk:#a61b1b;
    --muted:#7a756a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Inter Tight',sans-serif;font-size:14px}
  body{
    background-image:
      radial-gradient(circle at 15% 8%, rgba(255,106,0,.05), transparent 35%),
      radial-gradient(circle at 88% 92%, rgba(26,75,255,.04), transparent 40%);
    min-height:100vh;
  }
  .hidden{display:none !important}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}

  /* ============ TOPBAR ============ */
  .topbar{
    border-top:3px solid var(--ink);border-bottom:1px solid var(--ink);
    padding:16px 36px;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;
    background:var(--paper);position:sticky;top:0;z-index:10;
  }
  .topbar .brand{display:flex;flex-direction:column;gap:2px}
  .topbar .eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
  .topbar .eyebrow .dash{color:var(--accent);margin:0 6px}
  .topbar h1{font-family:'Fraunces',serif;font-weight:700;font-size:26px;line-height:1;letter-spacing:-.01em;margin:0}
  .topbar h1 em{font-style:italic;color:var(--accent);font-weight:400}
  .topbar .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .btn{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    padding:8px 14px;border:1px solid var(--ink);background:var(--paper);color:var(--ink);
    transition:all .15s;
  }
  .btn:hover{background:var(--ink);color:var(--paper)}
  .btn.primary{background:var(--ink);color:var(--paper)}
  .btn.primary:hover{background:var(--accent);color:var(--ink);border-color:var(--ink)}
  .btn.accent{background:var(--accent);color:var(--ink);border-color:var(--ink)}
  .btn.ghost{border-color:var(--muted);color:var(--muted)}
  .btn.ghost:hover{border-color:var(--ink);color:var(--ink);background:transparent}
  .btn.active{background:var(--accent);color:var(--ink);border-color:var(--ink);font-weight:600}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn.icon{padding:8px 10px}

  /* Privacy-mode: override fonts zodat Google Fonts niet nodig is */
  body.privacy-mode,
  body.privacy-mode *{
    font-family:Georgia, "Times New Roman", serif !important;
  }
  body.privacy-mode .eyebrow,
  body.privacy-mode .meta,
  body.privacy-mode [class*="mono"],
  body.privacy-mode .ctrl-code,
  body.privacy-mode .ha-code,
  body.privacy-mode .str-letter,
  body.privacy-mode pre,
  body.privacy-mode code,
  body.privacy-mode .chip,
  body.privacy-mode .config-select,
  body.privacy-mode .btn,
  body.privacy-mode .ctrl-body .ctrl-meta,
  body.privacy-mode .hint,
  body.privacy-mode .tab,
  body.privacy-mode .ov-kv dt,
  body.privacy-mode .panel-head .tag,
  body.privacy-mode .sec-sub,
  body.privacy-mode .stack-foot{
    font-family:Consolas, "Courier New", monospace !important;
  }
  body.privacy-mode h1,
  body.privacy-mode h2,
  body.privacy-mode h3,
  body.privacy-mode h4,
  body.privacy-mode .ch-name,
  body.privacy-mode .si-name,
  body.privacy-mode .step-num,
  body.privacy-mode .sec-title,
  body.privacy-mode .iv-name,
  body.privacy-mode .ha-text strong,
  body.privacy-mode .str-name,
  body.privacy-mode .risk-card h3,
  body.privacy-mode .ld-num,
  body.privacy-mode .ld-title h3,
  body.privacy-mode .gap-flag b,
  body.privacy-mode .wizard-step h2,
  body.privacy-mode .empty h2,
  body.privacy-mode .lede .big,
  body.privacy-mode .ov-block h3,
  body.privacy-mode .export-card h3,
  body.privacy-mode .stride-head h3,
  body.privacy-mode .steer-block h3,
  body.privacy-mode .h-group h3{
    font-family:Georgia, "Times New Roman", serif !important;
  }
  body.privacy-mode::before{
    content:"🔒 PRIVACY-MODE — system-fonts, geen CDN-leak. Let op: clipboard kan PG bevatten.";
    display:block;position:sticky;top:0;z-index:100;
    background:#0a0a0a;color:#ff6a00;text-align:center;padding:6px;
    font-family:Consolas,monospace !important;font-size:10px;letter-spacing:.14em;
  }

  /* PII-warning modal */
  .pii-modal-bg{
    position:fixed;inset:0;background:rgba(10,10,10,.72);z-index:200;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .pii-modal{
    background:var(--paper);border:2px solid var(--risk);max-width:640px;width:100%;
    padding:28px;box-shadow:6px 6px 0 var(--ink);
  }
  .pii-modal h3{font-family:'Fraunces',serif;font-size:22px;font-weight:700;margin:0 0 8px;color:var(--risk)}
  .pii-modal .tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .pii-modal ul{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--paper-2);padding:12px 20px;margin:8px 0 16px;border:1px solid var(--line);max-height:200px;overflow-y:auto}
  .pii-modal ul li{margin-bottom:4px}
  .pii-modal ul li b{color:var(--risk)}
  .pii-modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
  .config-select{
    font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 12px;
    border:1px solid var(--ink);background:var(--paper);min-width:220px;
  }

  /* ============ FRAME ============ */
  .frame{max-width:1400px;margin:0 auto;padding:32px 36px 80px}

  .sec-title{font-family:'Fraunces',serif;font-weight:700;font-size:28px;letter-spacing:-.01em;margin:0 0 4px}
  .sec-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:20px}

  /* ============ WIZARD ============ */
  .wizard-shell{background:var(--paper);border:1px solid var(--ink);padding:36px;max-width:920px;margin:0 auto}
  .steps-indicator{display:flex;gap:6px;margin-bottom:28px;padding-bottom:22px;border-bottom:1px dashed var(--line)}
  .step-dot{
    flex:1;height:4px;background:var(--paper-2);border:1px solid var(--ink);
    position:relative;
  }
  .step-dot.done{background:var(--ink)}
  .step-dot.current{background:var(--accent)}
  .step-dot span{
    position:absolute;top:10px;left:0;font-family:'JetBrains Mono',monospace;font-size:9px;
    letter-spacing:.14em;text-transform:uppercase;color:var(--muted);white-space:nowrap;
  }
  .step-dot.current span{color:var(--ink);font-weight:600}

  .wizard-step{display:none;padding-top:18px}
  .wizard-step.active{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .step-num{font-family:'Fraunces',serif;font-size:56px;font-weight:700;line-height:.8;color:var(--accent);margin-bottom:4px}
  .step-num small{display:block;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.2em;font-weight:400;margin-top:8px;text-transform:uppercase}
  .wizard-step h2{font-family:'Fraunces',serif;font-size:30px;font-weight:700;margin:6px 0 8px;line-height:1.05;letter-spacing:-.01em}
  .wizard-step .lede{font-family:'Fraunces',serif;font-size:16px;line-height:1.5;font-style:italic;color:#333;margin:0 0 24px;max-width:620px}

  .field{margin-bottom:18px}
  .field label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .field input[type=text], .field input[type=url], .field textarea, .field select{
    width:100%;padding:10px 12px;border:1px solid var(--ink);background:var(--paper);
    font-family:'Inter Tight',sans-serif;font-size:14px;
  }
  .field input:focus, .field textarea:focus, .field select:focus{outline:2px solid var(--accent);outline-offset:-2px}
  .field textarea{min-height:78px;resize:vertical}
  .field .hint{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.04em}

  .row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

  .choice-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-top:6px}
  .choice{
    border:1px solid var(--line);padding:14px 16px;background:var(--paper);cursor:pointer;
    transition:all .15s;display:block;
  }
  .choice:hover{background:var(--ink);color:var(--paper)}
  .choice:hover .ch-risk{color:var(--accent)}
  .choice.selected{background:var(--ink);color:var(--paper);border-color:var(--accent);box-shadow:3px 3px 0 var(--accent)}
  .choice.selected .ch-risk{color:var(--accent)}
  .ch-name{font-family:'Fraunces',serif;font-size:17px;font-weight:600;line-height:1.15}
  .ch-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.05em;display:flex;justify-content:space-between;gap:8px}
  .choice:hover .ch-meta,.choice.selected .ch-meta{color:#bbb}
  .ch-desc{font-size:12px;margin-top:6px;line-height:1.4;color:#555}
  .choice:hover .ch-desc,.choice.selected .ch-desc{color:#ccc}
  .ch-risk{font-weight:600}
  .ch-risk.h{color:var(--risk)}
  .ch-risk.m{color:var(--warn)}
  .ch-risk.l{color:var(--ok)}

  .wizard-nav{
    display:flex;justify-content:space-between;gap:12px;margin-top:32px;padding-top:22px;
    border-top:1px solid var(--ink);
  }

  /* ============ DASHBOARD ============ */
  .dashboard{display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:start}
  .side{
    background:var(--paper);border:1px solid var(--ink);padding:18px;position:sticky;top:100px;
    max-height:calc(100vh - 120px);overflow-y:auto;
  }
  .side-head{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:0 0 12px;display:flex;justify-content:space-between;align-items:center}
  .side-list{display:flex;flex-direction:column;gap:4px}
  .side-item{
    padding:10px 12px;border:1px solid transparent;cursor:pointer;background:var(--paper-2);
    transition:all .15s;
  }
  .side-item:hover{border-color:var(--ink)}
  .side-item.active{background:var(--ink);color:var(--paper);border-color:var(--accent);box-shadow:3px 3px 0 var(--accent)}
  .si-name{font-family:'Fraunces',serif;font-size:15px;font-weight:600;line-height:1.15}
  .si-meta{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px;letter-spacing:.04em}
  .side-item.active .si-meta{color:#bbb}

  .main-panel{background:var(--paper);border:1px solid var(--ink);padding:0;min-height:500px}
  .panel-head{padding:24px 28px 18px;border-bottom:1px solid var(--ink)}
  .panel-head h2{font-family:'Fraunces',serif;font-size:30px;font-weight:700;margin:0;line-height:1}
  .panel-head .tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:6px}

  .tabs{display:flex;gap:0;border-bottom:1px solid var(--ink);background:var(--paper-2)}
  .tab{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    padding:14px 22px;border:none;background:transparent;border-right:1px solid var(--ink);
    color:var(--muted);cursor:pointer;
  }
  .tab.active{background:var(--paper);color:var(--ink);font-weight:600;box-shadow:inset 0 -3px 0 var(--accent)}
  .tab:hover:not(.active){background:var(--paper-3);color:var(--ink)}

  .tab-pane{display:none;padding:28px}
  .tab-pane.active{display:block}

  /* Overview tab */
  .ov-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:24px;margin-bottom:22px}
  .ov-block{border:1px solid var(--line);padding:18px;background:var(--paper)}
  .ov-block h3{font-family:'Fraunces',serif;font-size:18px;margin:0 0 10px;font-weight:600}
  .ov-kv{display:grid;grid-template-columns:120px 1fr;gap:6px 14px;font-size:13px}
  .ov-kv dt{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding-top:2px}
  .ov-kv dd{margin:0;font-weight:500}
  .ov-risk{display:flex;gap:8px;margin-top:12px}
  .ov-risk .r{flex:1;padding:12px;text-align:center;border:1px solid var(--ink)}
  .ov-risk .r .n{font-family:'Fraunces',serif;font-size:32px;font-weight:700;line-height:1;display:block}
  .ov-risk .r .l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:4px;display:block}
  .ov-risk .r.h{background:var(--risk);color:var(--paper)}
  .ov-risk .r.h .l{color:rgba(255,255,255,.7)}
  .ov-risk .r.m{background:var(--warn);color:var(--paper)}
  .ov-risk .r.m .l{color:rgba(255,255,255,.7)}
  .ov-risk .r.l{background:var(--ok);color:var(--paper)}
  .ov-risk .r.l .l{color:rgba(255,255,255,.7)}

  .status-bar{display:flex;gap:2px;margin-top:12px;height:14px;border:1px solid var(--ink)}
  .status-bar span{transition:width .2s}
  .status-bar .s-open{background:var(--paper-2)}
  .status-bar .s-prog{background:var(--warn)}
  .status-bar .s-done{background:var(--ok)}
  .status-bar .s-na{background:var(--muted)}
  .status-bar .s-risk{background:var(--risk)}

  .gap-flags{margin-top:18px}
  .gap-flag{
    padding:12px 14px;border-left:3px solid var(--accent);background:var(--paper-2);
    margin-bottom:8px;font-size:13px;
  }
  .gap-flag b{font-family:'Fraunces',serif;font-size:14px;font-weight:600}
  .gap-flag .ref{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-left:6px}

  /* Controls tab */
  .ctrl-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:14px;border-bottom:1px dashed var(--line)}
  .chip{
    border:1px solid var(--ink);padding:5px 10px;border-radius:999px;background:var(--paper);
    font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;display:inline-flex;
    align-items:center;gap:6px;user-select:none;transition:all .15s;
  }
  .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--ink)}
  .chip[data-fw="AVG"] .dot{background:var(--accent-2)}
  .chip[data-fw="DORA"] .dot{background:var(--gold)}
  .chip[data-fw="Cbw"] .dot{background:var(--ok)}
  .chip[data-fw="AIAct"] .dot{background:var(--accent)}
  .chip.off{opacity:.3}
  .chip:hover{transform:translateY(-1px);box-shadow:2px 2px 0 var(--ink)}

  .h-group{margin-bottom:28px}
  .h-group h3{
    font-family:'Fraunces',serif;font-size:22px;font-weight:700;margin:0 0 4px;
    display:flex;align-items:center;gap:10px;
  }
  .h-group h3 .hcount{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);font-weight:400;letter-spacing:.1em}
  .h-group .hdesc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}

  .ctrl-row{
    display:grid;grid-template-columns:70px 1fr 180px;gap:14px;
    padding:14px 0;border-bottom:1px dotted var(--line);align-items:start;
  }
  .ctrl-row:last-child{border-bottom:none}
  .ctrl-code{
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
    background:var(--ink);color:var(--paper);padding:4px 8px;letter-spacing:.05em;
    display:inline-block;align-self:start;
  }
  .ctrl-body strong{font-family:'Fraunces',serif;font-size:15px;font-weight:600;display:block;margin-bottom:2px}
  .ctrl-body .ctrl-desc{font-size:12.5px;line-height:1.45;color:#444;margin:2px 0 6px}
  .ctrl-body .ctrl-meta{display:flex;gap:8px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.06em;color:var(--muted)}
  .ctrl-body .ctrl-meta span{background:var(--paper-2);padding:2px 6px;border:1px solid var(--line)}
  .ctrl-body .ctrl-meta .fw-AVG{border-color:var(--accent-2);color:var(--accent-2)}
  .ctrl-body .ctrl-meta .fw-DORA{border-color:var(--gold);color:#7a6230}
  .ctrl-body .ctrl-meta .fw-Cbw{border-color:var(--ok);color:var(--ok)}
  .ctrl-body .ctrl-meta .fw-AIAct{border-color:var(--accent);color:var(--accent)}
  .ctrl-body .ctrl-meta .gap{background:var(--accent);color:var(--ink);border-color:var(--ink);font-weight:600}
  .ctrl-body .ctrl-trig{margin-top:4px;font-size:11px;color:var(--muted);font-style:italic}

  .ctrl-status{display:flex;flex-direction:column;gap:4px}
  .ctrl-status select, .ctrl-status input{
    padding:5px 7px;border:1px solid var(--line);font-size:11.5px;background:var(--paper);width:100%;
    font-family:'JetBrains Mono',monospace;letter-spacing:.03em;
  }
  .ctrl-status select{font-weight:600}
  .ctrl-status select[data-v="open"]{background:var(--paper-2)}
  .ctrl-status select[data-v="prog"]{background:#fff4e6;color:var(--warn)}
  .ctrl-status select[data-v="done"]{background:#e6f5ec;color:var(--ok)}
  .ctrl-status select[data-v="na"]{background:var(--paper-3);color:var(--muted)}
  .ctrl-status select[data-v="risk"]{background:#fde7e7;color:var(--risk)}

  /* Risks tab */
  .risk-card{
    border:1px solid var(--ink);border-left:6px solid var(--accent);padding:18px 22px;margin-bottom:14px;
    background:var(--paper);
  }
  .risk-card h3{font-family:'Fraunces',serif;font-size:20px;margin:0 0 8px;font-weight:600}
  .risk-card .rc-ref{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
  .risk-card p{margin:0 0 6px;font-size:13px;line-height:1.5}
  .risk-card .rc-ctrls{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
  .risk-card .rc-ctrls span{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--ink);color:var(--paper);padding:2px 6px}

  /* Historie tab */
  .hist-table{width:100%;border-collapse:collapse;font-size:13px;border:1px solid var(--ink);background:var(--paper)}
  .hist-table thead th{
    background:var(--ink);color:var(--paper);font-family:'JetBrains Mono',monospace;font-size:10px;
    letter-spacing:.14em;text-transform:uppercase;font-weight:500;text-align:left;padding:10px 14px;
  }
  .hist-table tbody td{padding:8px 14px;border-top:1px dotted var(--line);vertical-align:top}
  .hist-table tbody tr:hover{background:var(--paper-2)}
  .hist-when{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;width:140px}
  .hist-who{font-family:'JetBrains Mono',monospace;font-size:11px;width:80px}
  .hist-action{line-height:1.5}
  .hist-action code{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--paper-2);padding:2px 6px;border:1px solid var(--line)}
  .hist-action b{font-family:'Fraunces',serif;font-weight:600;font-size:14px}

  /* STRIDE tab */
  .stride-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
  .stride-summary .ss-cell{text-align:center;padding:14px;border:1px solid var(--ink);background:var(--paper)}
  .stride-summary .ss-cell .n{display:block;font-family:'Fraunces',serif;font-size:30px;font-weight:700;line-height:1}
  .stride-summary .ss-cell .l{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px}
  .stride-summary .ss-cell.low{background:#e6f5ec;border-color:var(--ok);color:var(--ok)}
  .stride-summary .ss-cell.med{background:#fff4e6;border-color:var(--warn);color:var(--warn)}
  .stride-summary .ss-cell.high{background:#fde7e7;border-color:var(--risk);color:var(--risk)}

  .stride-heatmap{border:1px solid var(--ink);background:var(--paper);margin-bottom:28px;padding:0}
  .stride-row{display:grid;grid-template-columns:240px 1fr 110px;gap:0;border-bottom:1px solid var(--ink);align-items:stretch}
  .stride-row:last-child{border-bottom:none}
  .str-key{display:flex;align-items:center;gap:14px;padding:14px 18px;border-right:1px solid var(--ink);background:var(--paper-2)}
  .str-letter{font-family:'Fraunces',serif;font-size:36px;font-weight:700;line-height:1;color:var(--accent);width:36px;text-align:center}
  .str-name{font-family:'Fraunces',serif;font-size:16px;font-weight:600;line-height:1}
  .str-sub{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .str-cells{display:grid;grid-template-columns:1fr 1fr 1fr}
  .str-cell{padding:14px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--muted);border-right:1px solid var(--ink);opacity:.18}
  .str-cell:last-child{border-right:none}
  .str-cell.on{opacity:1;color:var(--ink);font-weight:600;box-shadow:inset 0 -3px 0 var(--ink)}
  .str-cell.low.on{background:#e6f5ec;color:var(--ok);box-shadow:inset 0 -3px 0 var(--ok)}
  .str-cell.med.on{background:#fff4e6;color:var(--warn);box-shadow:inset 0 -3px 0 var(--warn)}
  .str-cell.high.on{background:#fde7e7;color:var(--risk);box-shadow:inset 0 -3px 0 var(--risk)}
  .str-nums{padding:14px 18px;border-left:1px solid var(--ink);background:var(--paper-2);text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;display:flex;flex-direction:column;justify-content:center}
  .str-nums .hint{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

  .stride-blocks{display:flex;flex-direction:column;gap:14px}
  .stride-block{border:1px solid var(--ink);background:var(--paper);padding:0}
  .stride-head{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--ink);background:var(--paper-2)}
  .stride-head .str-letter{font-size:28px}
  .stride-head h3{font-family:'Fraunces',serif;font-size:20px;font-weight:700;margin:0}
  .stride-head .str-subhead{font-weight:400;color:var(--muted);font-size:14px;font-style:italic}
  .str-level{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;padding:5px 10px;border:1px solid var(--ink)}
  .str-level.low{background:#e6f5ec;color:var(--ok);border-color:var(--ok)}
  .str-level.med{background:#fff4e6;color:var(--warn);border-color:var(--warn)}
  .str-level.high{background:#fde7e7;color:var(--risk);border-color:var(--risk)}
  .str-level.na{background:var(--paper-3);color:var(--muted)}
  .str-desc{padding:12px 18px;font-size:13px;line-height:1.5;color:#444;margin:0;border-bottom:1px dashed var(--line);font-style:italic}
  .str-stats{padding:10px 18px;display:flex;gap:14px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:11px;border-bottom:1px dashed var(--line);color:var(--muted)}
  .str-stats .hint{color:var(--muted)}
  .str-empty{padding:14px 18px;font-family:'Fraunces',serif;font-style:italic;color:var(--muted);margin:0}
  .str-ctrls{padding:10px 18px 14px}
  .str-ctrl{display:grid;grid-template-columns:70px 1fr auto;gap:12px;align-items:center;padding:7px 0;border-bottom:1px dotted var(--line);font-size:13px}
  .str-ctrl:last-child{border-bottom:none}
  .str-ctrl .ctrl-code{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--ink);color:var(--paper);padding:3px 7px;letter-spacing:.05em;display:inline-block;align-self:center;width:fit-content}
  .str-ctrl .ctrl-name{font-family:'Fraunces',serif;font-weight:500}
  .str-ctrl .ctrl-tag{font-size:14px}
  .str-ctrl.status-open{background:rgba(166,27,27,.03)}
  .str-ctrl.status-open .ctrl-name{color:var(--risk);font-weight:600}
  .str-ctrl.status-prog{background:rgba(168,87,28,.04)}
  .str-ctrl.status-done{opacity:.65}
  .str-ctrl.status-na{opacity:.4}
  .str-ctrl.status-risk{background:rgba(255,106,0,.05)}
  .str-ctrl.gap .ctrl-code{background:var(--accent);color:var(--ink)}

  /* Steer tab */
  .steer-block{margin-bottom:28px;border:1px solid var(--ink);background:var(--paper)}
  .steer-block h3{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin:0;padding:14px 18px;border-bottom:1px solid var(--ink);background:var(--paper-2);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .steer-block h3 .tier{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);font-weight:400;letter-spacing:.12em;text-transform:uppercase}
  .steer-block .body{padding:0}
  .steer-block .desc{padding:14px 18px;font-size:13px;line-height:1.5;color:#444;border-bottom:1px dashed var(--line);margin:0}
  .steer-block pre{
    margin:0;padding:18px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.55;
    background:#0a0a0a;color:#e8e4d6;overflow-x:auto;max-height:420px;overflow-y:auto;white-space:pre-wrap;word-wrap:break-word;
  }
  .steer-block pre b{color:var(--accent);font-weight:600}
  .steer-block .actions{padding:12px 18px;border-top:1px solid var(--ink);display:flex;gap:8px;flex-wrap:wrap;background:var(--paper)}
  .steer-tier{display:inline-block;padding:2px 7px;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--ink);margin-right:4px}
  .steer-tier.soft{background:var(--paper-2)}
  .steer-tier.medium{background:#fff4e6;color:var(--warn);border-color:var(--warn)}
  .steer-tier.hard{background:#fde7e7;color:var(--risk);border-color:var(--risk)}
  .steer-tier.org{background:var(--paper-3);color:var(--muted)}
  .steer-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
  .steer-summary .ss-cell{text-align:center;padding:14px;border:1px solid var(--ink);background:var(--paper)}
  .steer-summary .ss-cell .n{display:block;font-family:'Fraunces',serif;font-size:32px;font-weight:700;line-height:1}
  .steer-summary .ss-cell .l{display:block;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px}
  .steer-summary .ss-cell.soft{background:var(--paper-2)}
  .steer-summary .ss-cell.medium{background:#fff4e6}
  .steer-summary .ss-cell.hard{background:#fde7e7}

  /* Export tab */
  .export-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:20px}
  .export-card{border:1px solid var(--ink);padding:20px;background:var(--paper)}
  .export-card h3{font-family:'Fraunces',serif;font-size:18px;margin:0 0 6px;font-weight:600}
  .export-card p{font-size:12.5px;color:#555;line-height:1.45;margin:0 0 14px}

  /* Empty state */
  .empty{
    text-align:center;padding:80px 40px;max-width:540px;margin:0 auto;
    background:var(--paper);border:1px dashed var(--line);
  }
  .empty h2{font-family:'Fraunces',serif;font-size:32px;font-weight:700;margin:0 0 10px}
  .empty p{font-size:14px;line-height:1.6;color:#444;margin:0 0 18px}

  /* Disclaimer */
  .disclaimer{
    background:#fff4e6;border:1px solid var(--warn);padding:12px 16px;
    font-size:12px;margin-bottom:20px;line-height:1.5;
  }
  .disclaimer b{color:var(--warn);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:4px}

  /* Footer */
  footer{
    margin-top:48px;padding-top:20px;border-top:1px solid var(--ink);
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
    display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;
  }

  /* Print */
  @media print{
    body{background:#fff}
    .topbar, .side, .tabs, .wizard-nav, .ctrl-status, .ctrl-filters, .btn, .export-grid{display:none !important}
    .dashboard{grid-template-columns:1fr;gap:0}
    .frame{max-width:none;padding:12px}
    .main-panel{border:none}
    .tab-pane{display:block !important;padding:12px 0;page-break-inside:avoid}
    .h-group{page-break-inside:avoid}
    .ctrl-row{grid-template-columns:60px 1fr}
    @page{size:A4;margin:14mm}
  }

  @media (max-width:900px){
    .dashboard{grid-template-columns:1fr}
    .side{position:static;max-height:none}
    .row, .row-3{grid-template-columns:1fr}
    .ov-grid{grid-template-columns:1fr}
    .topbar{grid-template-columns:1fr;gap:12px}
  }
</style>
</head>

<script>
/* ============================================================

const HARNAS_LAYERS = {

const harnas = {

/* AuCx 4-lagen — invullingen met ctrl-activering */
const aucx = {

/* ============================================================
   PII-DETECTIE — waarschuwing bij copy/export van gevoelige data
   ============================================================ */
const PII_PATTERNS = [
  { name:"BSN-achtig (9 cijfers)", re:/\b\d{9}\b/g },
  { name:"e-mailadres",            re:/\b[\w.+-]+@[\w-]+\.[\w.-]+\b/gi },
  { name:"telefoonnummer NL",      re:/\b(?:\+31|0031|0)[\s-]?(?:[1-9][\s-]?){8,9}\b/g },
  { name:"IBAN NL",                re:/\bNL\d{2}[A-Z]{4}\d{10}\b/gi },
  { name:"BTW-nummer NL",          re:/\bNL\d{9}B\d{2}\b/gi }
];
function detectPII(text){
  const findings = [];
  PII_PATTERNS.forEach(p => {
    const matches = (text||"").match(p.re);
    if(matches){
      const uniq = [...new Set(matches)].slice(0,5);
      findings.push({ type:p.name, samples:uniq, count:matches.length });
    }
  });
  return findings;
}

/* Modal voor PII-waarschuwing — returns Promise<boolean> (continue?) */
function confirmPII(text, context){
  return new Promise(resolve => {
    const findings = detectPII(text);
    if(findings.length === 0){ resolve(true); return; }
    const bg = document.createElement("div");
    bg.className = "pii-modal-bg";
    bg.innerHTML = `
      <div class="pii-modal">
        <div class="tag">${context}</div>
        <h3>⚠ Mogelijke persoonsgegevens gevonden</h3>
        <p style="font-size:13px;line-height:1.5">Voordat je dit deelt, controleer of de volgende aangetroffen patronen bedoeld zijn en toegestaan zijn binnen de grondslag van deze use-case.</p>
        <ul>
          ${findings.map(f=>`<li><b>${f.type}</b> (${f.count}×): ${f.samples.map(s=>'<code>'+esc(s)+'</code>').join(', ')}${f.count>f.samples.length?', …':''}</li>`).join("")}
        </ul>
        <div class="actions">
          <button class="btn ghost" id="piiCancel">Annuleer</button>
          <button class="btn" id="piiAnon">Anonimiseer & doorgaan</button>
          <button class="btn primary" id="piiOk">Toch doorgaan</button>
        </div>
      </div>`;
    document.body.appendChild(bg);
    bg.querySelector("#piiCancel").onclick = ()=>{ bg.remove(); resolve(false); };
    bg.querySelector("#piiOk").onclick     = ()=>{ bg.remove(); resolve({proceed:true, anon:false}); };
    bg.querySelector("#piiAnon").onclick   = ()=>{ bg.remove(); resolve({proceed:true, anon:true}); };
  });
}

function anonymize(text){
  let out = text;
  PII_PATTERNS.forEach(p => { out = out.replace(p.re, `[${p.name.toUpperCase().split(" ")[0]}-GEREDACT]`); });
  return out;
}

/* Wrappers die PII-check doen voor copy/download */
async function copyTextPII(text, msg, ctx){
  const res = await confirmPII(text, ctx||"Clipboard");
  if(!res) return;
  const final = res.anon ? anonymize(text) : text;
  navigator.clipboard.writeText(final).then(()=>alert((msg||"Gekopieerd") + (res.anon?" (geanonimiseerd)":"")));
}
async function downloadTextPII(text, name, mime, ctx){
  const res = await confirmPII(text, ctx||"Download");
  if(!res) return;
  const final = res.anon ? anonymize(text) : text;
  const finalName = res.anon ? name.replace(/(\.[^.]+)$/, "-anon$1") : name;
  downloadText(final, finalName, mime);
}

  L04app:  ["gen","cfg","built"],
  L04pr:   ["pgen","ptr"],
  L03sc:   ["s0","s1","s2","s3","s4"],
  L03pg:   ["pg_none","pg_normal","pg_special"],
  L02mod:  ["pub_closed","pub_open","priv_closed","priv_open"],
  L02ft:   ["ft_no","ft_yes"],
  L01inf:  ["onprem","cloud","hybrid","edge"],
  statuses:["open","prog","done","na","risk"]
};
function validateConfig(obj){
  const errors = [];
  if(!obj || typeof obj !== "object"){ return { ok:false, errors:["geen object"] }; }
  SCHEMA.top.forEach(k => { if(!(k in obj)) errors.push(`veld ontbreekt: ${k}`); });
  if(obj.id && !/^[\w_-]{3,80}$/.test(obj.id)) errors.push(`id ongeldig: ${obj.id}`);
  if(obj.name && obj.name.length > 200) errors.push(`name te lang (>200)`);
  if(obj.aiActClass && !SCHEMA.aiClass.includes(obj.aiActClass)) errors.push(`aiActClass ongeldig: ${obj.aiActClass}`);
  if(obj.L04?.app && !SCHEMA.L04app.includes(obj.L04.app)) errors.push(`L04.app ongeldig: ${obj.L04.app}`);
  if(obj.L04?.prompts && !SCHEMA.L04pr.includes(obj.L04.prompts)) errors.push(`L04.prompts ongeldig: ${obj.L04.prompts}`);
  if(obj.L03?.scope && !SCHEMA.L03sc.includes(obj.L03.scope)) errors.push(`L03.scope ongeldig: ${obj.L03.scope}`);
  if(obj.L03?.pg && !SCHEMA.L03pg.includes(obj.L03.pg)) errors.push(`L03.pg ongeldig: ${obj.L03.pg}`);
  if(obj.L02?.model && !SCHEMA.L02mod.includes(obj.L02.model)) errors.push(`L02.model ongeldig: ${obj.L02.model}`);
  if(obj.L02?.finetune && !SCHEMA.L02ft.includes(obj.L02.finetune)) errors.push(`L02.finetune ongeldig: ${obj.L02.finetune}`);
  if(obj.L01?.infra && !SCHEMA.L01inf.includes(obj.L01.infra)) errors.push(`L01.infra ongeldig: ${obj.L01.infra}`);
  if(obj.controlStatus && typeof obj.controlStatus === "object"){
    Object.entries(obj.controlStatus).forEach(([code, st])=>{
      if(!harnas[code]) errors.push(`controlStatus ${code}: onbekende control-code`);
      if(st && st.status && !SCHEMA.statuses.includes(st.status)) errors.push(`${code}.status ongeldig: ${st.status}`);
      if(st && st.evidence && !/^(https?:|file:|mailto:)/.test(st.evidence))
        errors.push(`${code}.evidence: onveilig URL-schema "${st.evidence.slice(0,30)}"`);
    });
  }
  return { ok: errors.length === 0, errors };
}

/* SHA-256 hash over canonical JSON (sleutels alfabetisch gesorteerd) */
function canonicalize(obj){
  if(obj === null || typeof obj !== "object") return JSON.stringify(obj);
  if(Array.isArray(obj)) return "[" + obj.map(canonicalize).join(",") + "]";
  return "{" + Object.keys(obj).sort().map(k => JSON.stringify(k) + ":" + canonicalize(obj[k])).join(",") + "}";
}
async function computeHash(obj){
  const { _integrity, ...clean } = obj;
  const text = canonicalize(clean);
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function newId(){ return "cfg_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,6); }
function nowIso(){ return new Date().toISOString(); }
function nowDate(){ return new Date().toISOString().slice(0,10); }
function slug(s){ return (s||"config").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,50) || "config"; }


/* ============================================================
   ENGINE — generateHarnas(config) → {controls, triggers, risk}
   ============================================================ */
function generateHarnas(cfg){
  const triggeredBy = {}; // code → Set of reasons
  function add(codes, reason){
    codes.forEach(c=>{
      if(!triggeredBy[c]) triggeredBy[c] = new Set();
      triggeredBy[c].add(reason);
    });
  }

  // L04 Applicatie
  if(cfg.L04?.app){
    const inv = aucx.L04.invul.find(x=>x.id===cfg.L04.app);
    if(inv) add(inv.ctrl, `L04 · ${inv.name}`);
  }
  if(cfg.L04?.prompts){
    const inv = aucx.L04.promptInvul.find(x=>x.id===cfg.L04.prompts);
    if(inv) add(inv.ctrl, `L04 · ${inv.name}`);
  }

  // L03 Data scope + PG
  if(cfg.L03?.scope){
    const inv = aucx.L03.invul.find(x=>x.id===cfg.L03.scope);
    if(inv) add(inv.ctrl, `L03 · ${inv.name}`);
  }
  if(cfg.L03?.pg){
    const inv = aucx.L03.pgInvul.find(x=>x.id===cfg.L03.pg);
    if(inv) add(inv.ctrl, `L03 · ${inv.name}`);
  }

  // L02 Model + finetune
  let carrier = "intern";
  if(cfg.L02?.model){
    const inv = aucx.L02.invul.find(x=>x.id===cfg.L02.model);
    if(inv){ add(inv.ctrl, `L02 · ${inv.name}`); carrier = inv.carrier || "intern"; }
  }
  if(cfg.L02?.finetune){
    const inv = aucx.L02.ftInvul.find(x=>x.id===cfg.L02.finetune);
    if(inv) add(inv.ctrl, `L02 · ${inv.name}`);
  }

  // L01 Infra
  if(cfg.L01?.infra){
    const inv = aucx.L01.invul.find(x=>x.id===cfg.L01.infra);
    if(inv) add(inv.ctrl, `L01 · ${inv.name}`);
  }

  // AI Act triggers
  const activeTriggers = aiActTriggers.filter(t => {
    try { return t.cond(cfg); } catch(e){ return false; }
  });
  activeTriggers.forEach(t => add(t.ctrl, `trigger · ${t.title}`));

  // Build control list, sorted per H-layer
  const codes = Object.keys(triggeredBy).sort();
  const controls = codes.map(c => {
    const h = harnas[c];
    if(!h) return null;
    const gapCtrls = new Set();
    activeTriggers.forEach(t => t.ctrl.forEach(x => gapCtrls.add(x)));
    return {
      code: c,
      name: h.n,
      desc: h.d,
      fw: h.fw,
      layer: c[0],
      triggeredBy: [...triggeredBy[c]],
      carrier,
      cbwRef: cbwReverse[c] || [],
      digidRef: digidReverse[c] || [],
      gapFlag: gapCtrls.has(c)
    };
  }).filter(Boolean);

  // Risk breakdown based on chosen invullingen
  const risk = {h:0,m:0,l:0};
  const choices = [
    aucx.L04.invul.find(x=>x.id===cfg.L04?.app),
    aucx.L04.promptInvul.find(x=>x.id===cfg.L04?.prompts),
    aucx.L03.invul.find(x=>x.id===cfg.L03?.scope),
    aucx.L03.pgInvul.find(x=>x.id===cfg.L03?.pg),
    aucx.L02.invul.find(x=>x.id===cfg.L02?.model),
    aucx.L02.ftInvul.find(x=>x.id===cfg.L02?.finetune),
    aucx.L01.invul.find(x=>x.id===cfg.L01?.infra)
  ].filter(Boolean);
  choices.forEach(ch => { if(risk[ch.risk]!==undefined) risk[ch.risk]++; });

  return { controls, triggers: activeTriggers, risk, carrier };
}

/* ============================================================
   WIZARD — 5 stappen
   ============================================================ */
const WIZARD_STEPS = [
  { id:1, label:"Use-case", layer:"—" },
  { id:2, label:"Applicatie", layer:"L04" },
  { id:3, label:"Data", layer:"L03" },
  { id:4, label:"Model", layer:"L02" },
  { id:5, label:"Infra", layer:"L01" }
];

let wizardState = null; // {step, draft}

function openWizard(existingId){
  const existing = existingId ? state.configs[existingId] : null;
  wizardState = {
    step: 1,
    editId: existingId || null,
    draft: existing ? JSON.parse(JSON.stringify(existing)) : {
      id: newId(),
      name: "",
      owner: "",
      dpo: "",
      ciso: "",
      purpose: "",
      aiActClass: "limited",
      created: nowIso(),
      modified: nowIso(),
      L04: { app:"", prompts:"", agents:false },
      L03: { scope:"", pg:"pg_none", confidential:false },
      L02: { model:"", finetune:"ft_no" },
      L01: { infra:"" },
      controlStatus: {}
    }
  };
  switchView("wizard");
  renderWizard();
}

function renderWizard(){
  const { step, draft } = wizardState;
  // indicator
  document.getElementById("stepsIndicator").innerHTML = WIZARD_STEPS.map(s=>{
    const cls = s.id===step ? "current" : (s.id<step ? "done" : "");
    return `<div class="step-dot ${cls}"><span>${s.id}. ${s.label}</span></div>`;
  }).join("");

  const stepsEl = document.getElementById("wizardSteps");
  stepsEl.innerHTML = renderStep(step, draft);
  bindStepEvents(step);

  document.getElementById("btnBack").disabled = step===1;
  const btnNext = document.getElementById("btnNext");
  btnNext.textContent = step===5 ? "Opslaan & openen" : "Verder →";
  btnNext.disabled = !stepValid(step, draft);
}

function renderStep(step, d){
  if(step===1) return `
    <div class="step-num">01<small>— use-case</small></div>
    <h2>Waarvoor bouw je dit?</h2>
    <p class="lede">Een harnas begint bij een concrete use-case. Geef 'm een naam, een eigenaar, en beschrijf wat het systeem moet doen.</p>
    <div class="row">
      <div class="field">
        <label>Naam use-case *</label>
        <input type="text" id="f_name" value="${esc(d.name)}" placeholder="bijv. AuCx AI-audit-assistent" />
      </div>
      <div class="field">
        <label>Eigenaar *</label>
        <input type="text" id="f_owner" value="${esc(d.owner)}" placeholder="bijv. René Volwerk" />
      </div>
    </div>
    <div class="row">
      <div class="field"><label>DPO / privacy-contact</label><input type="text" id="f_dpo" value="${esc(d.dpo)}" placeholder="bijv. extern DPO-kantoor" /></div>
      <div class="field"><label>CISO / security-contact</label><input type="text" id="f_ciso" value="${esc(d.ciso)}" placeholder="bijv. René Volwerk" /></div>
    </div>
    <div class="field">
      <label>Beoogde functie *</label>
      <textarea id="f_purpose" placeholder="Wat doet dit systeem? Welk proces ondersteunt het? Wie zijn de eindgebruikers?">${esc(d.purpose)}</textarea>
    </div>
    <div class="field">
      <label>AI Act risicoklasse (best-guess)</label>
      <select id="f_aiclass">
        ${["minimal","limited","high-risk","unacceptable"].map(x=>`<option value="${x}" ${d.aiActClass===x?"selected":""}>${x}</option>`).join("")}
      </select>
      <div class="hint">Op basis van art. 6 + bijlage III. "High-risk" triggert verzwaarde eisen (M.02, M.03, D.02).</div>
    </div>`;

  if(step===2) return `
    <div class="step-num">02<small>— laag L04 · applicatie</small></div>
    <h2>Hoe maak je het systeem?</h2>
    <p class="lede">Hoe meer eigen bouw, hoe meer controls bij jou liggen — niet bij de leverancier.</p>
    <div class="field"><label>Applicatie-type *</label>
      <div class="choice-grid">${choiceCards(aucx.L04.invul, d.L04.app, "app")}</div>
    </div>
    <div class="field"><label>Prompt-aanpak *</label>
      <div class="choice-grid">${choiceCards(aucx.L04.promptInvul, d.L04.prompts, "prompts")}</div>
    </div>
    <div class="field">
      <label><input type="checkbox" id="f_agents" ${d.L04.agents?"checked":""} /> Agents / tool-use / autonome acties</label>
      <div class="hint">Triggert art. 14 AI Act (HITL) + sandbox-verplichting (I.06).</div>
    </div>`;

  if(step===3) return `
    <div class="step-num">03<small>— laag L03 · data</small></div>
    <h2>Welke data gaat erin?</h2>
    <p class="lede">Data-sensitiviteit bepaalt of de hele D-laag activeert — en triggert standaard een DPIA bij bijzondere PG.</p>
    <div class="field"><label>Data-scope *</label>
      <div class="choice-grid">${choiceCards(aucx.L03.invul, d.L03.scope, "scope")}</div>
    </div>
    <div class="field"><label>Persoonsgegevens *</label>
      <div class="choice-grid">${choiceCards(aucx.L03.pgInvul, d.L03.pg, "pg")}</div>
    </div>
    <div class="field">
      <label><input type="checkbox" id="f_conf" ${d.L03.confidential?"checked":""} /> Vertrouwelijke bedrijfsdata (BIO/commercieel gevoelig)</label>
      <div class="hint">Als ook in publieke API's: DLP-verplichting + no-training-clausule.</div>
    </div>`;

  if(step===4) return `
    <div class="step-num">04<small>— laag L02 · model</small></div>
    <h2>Welk model draait eronder?</h2>
    <p class="lede">Public API: leverancier deelt H2+H5. Self-hosted: alles bij jou. Finetuned: mogelijk provider-status (art. 25).</p>
    <div class="field"><label>Model-type *</label>
      <div class="choice-grid">${choiceCards(aucx.L02.invul, d.L02.model, "model")}</div>
    </div>
    <div class="field"><label>Finetuning *</label>
      <div class="choice-grid">${choiceCards(aucx.L02.ftInvul, d.L02.finetune, "finetune")}</div>
    </div>`;

  if(step===5) return `
    <div class="step-num">05<small>— laag L01 · infra</small></div>

      <div class="choice-grid">${choiceCards(aucx.L01.invul, d.L01.infra, "infra")}</div>
    </div>`;

  return "";
}

function choiceCards(list, selectedId, field){
  return list.map(iv => `
    <div class="choice ${iv.id===selectedId?"selected":""}" data-id="${iv.id}" data-field="${field}">
      <div class="ch-name">${iv.name}</div>
      <div class="ch-meta">
        <span>${iv.meta}</span>
        <span class="ch-risk ${iv.risk}">${iv.risk==="h"?"HIGH":iv.risk==="m"?"MED":"LOW"}</span>
      </div>
      <div class="ch-desc">${iv.desc}</div>
    </div>`).join("");
}

function bindStepEvents(step){
  const d = wizardState.draft;
  // Choice cards
  document.querySelectorAll("#wizardSteps .choice").forEach(el=>{
    el.addEventListener("click",()=>{
      const f = el.dataset.field;
      const id = el.dataset.id;
      if(step===2){
        if(f==="app") d.L04.app = id;
        if(f==="prompts") d.L04.prompts = id;
      } else if(step===3){
        if(f==="scope") d.L03.scope = id;
        if(f==="pg") d.L03.pg = id;
      } else if(step===4){
        if(f==="model") d.L02.model = id;
        if(f==="finetune") d.L02.finetune = id;
      } else if(step===5){
        if(f==="infra") d.L01.infra = id;
      }
      renderWizard();
    });
  });
  // Step 1 text fields
  if(step===1){
    ["name","owner","dpo","ciso","purpose"].forEach(f=>{
      const el = document.getElementById("f_"+f);
      if(el) el.addEventListener("input",()=>{ d[f] = el.value; document.getElementById("btnNext").disabled = !stepValid(1,d); });
    });
    const cls = document.getElementById("f_aiclass");
    if(cls) cls.addEventListener("change",()=>{ d.aiActClass = cls.value; });
  }
  // Step 2 agents checkbox
  if(step===2){
    const a = document.getElementById("f_agents");
    if(a) a.addEventListener("change",()=>{ d.L04.agents = a.checked; });
  }
  // Step 3 confidential checkbox
  if(step===3){
    const c = document.getElementById("f_conf");
    if(c) c.addEventListener("change",()=>{ d.L03.confidential = c.checked; });
  }
}

function stepValid(step, d){
  if(step===1) return !!(d.name.trim() && d.owner.trim() && d.purpose.trim());
  if(step===2) return !!(d.L04.app && d.L04.prompts);
  if(step===3) return !!(d.L03.scope && d.L03.pg);
  if(step===4) return !!(d.L02.model && d.L02.finetune);
  if(step===5) return !!d.L01.infra;
  return false;
}

function wizardNext(){
  if(!stepValid(wizardState.step, wizardState.draft)) return;
  if(wizardState.step < 5){
    wizardState.step++;
    renderWizard();
    return;
  }
  // finish
  const d = wizardState.draft;
  const isNew = !wizardState.editId;
  d.modified = nowIso();
  if(isNew){
    d.history = [];
    logChange(d, { kind:"create", note:`Config '${d.name}' aangemaakt · ${d.L04.app||"?"}/${d.L03.scope||"?"}/${d.L02.model||"?"}/${d.L01.infra||"?"}` });
  } else {
    logChange(d, { kind:"choice", layer:"wizard", field:"edit", to:"herzien via wizard" });
  }
  state.configs[d.id] = d;
  state.activeId = d.id;
  saveState();
  wizardState = null;
  switchView("dashboard");
  renderDashboard();
}

function wizardBack(){
  if(wizardState.step>1){ wizardState.step--; renderWizard(); }
}

function wizardCancel(){
  if(confirm("Wizard annuleren? Niet-opgeslagen wijzigingen gaan verloren.")){
    wizardState = null;
    if(Object.keys(state.configs).length === 0) switchView("empty");
    else { if(!state.activeId) state.activeId = Object.keys(state.configs)[0]; switchView("dashboard"); renderDashboard(); }
  }
}

function esc(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ============================================================
   DASHBOARD
   ============================================================ */
let activeTab = "overview";

function renderDashboard(){
  const cfg = state.configs[state.activeId];
  if(!cfg){ switchView("empty"); return; }

  // Sidebar
  const cfgs = Object.values(state.configs).sort((a,b)=>b.modified.localeCompare(a.modified));
  document.getElementById("cfgCount").textContent = `${cfgs.length}`;
  document.getElementById("sideList").innerHTML = cfgs.map(c=>{
    const h = generateHarnas(c);
    const openCount = h.controls.filter(x=>{
      const st = c.controlStatus[x.code]?.status || "open";
      return st === "open";
    }).length;
    return `<div class="side-item ${c.id===state.activeId?"active":""}" data-id="${c.id}">
      <div class="si-name">${esc(c.name)}</div>
      <div class="si-meta">${h.controls.length} controls · ${openCount} open · ${c.modified.slice(0,10)}</div>
    </div>`;
  }).join("");
  document.querySelectorAll("#sideList .side-item").forEach(el=>{
    el.addEventListener("click",()=>{ state.activeId = el.dataset.id; saveState(); renderDashboard(); });
  });

  // Head
  const h = generateHarnas(cfg);
  document.getElementById("cfgTitle").textContent = cfg.name;
  document.getElementById("cfgTag").innerHTML =
    `${cfg.owner} · ${cfg.aiActClass} · ${h.controls.length} controls · carrier: ${h.carrier} · laatst bewerkt ${cfg.modified.slice(0,10)}`;

  // Update config selector
  const sel = document.getElementById("configSelect");
  sel.innerHTML = cfgs.map(c=>`<option value="${c.id}" ${c.id===state.activeId?"selected":""}>${esc(c.name)}</option>`).join("");

  // Tabs
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.toggle("active", t.dataset.tab===activeTab);
  });
  document.querySelectorAll(".tab-pane").forEach(p=>{
    p.classList.toggle("active", p.id === "tab-"+activeTab);
  });

  if(activeTab==="overview") renderOverview(cfg, h);
  if(activeTab==="controls") renderControls(cfg, h);
  if(activeTab==="risks") renderRisks(cfg, h);
  if(activeTab==="stride") renderStride(cfg, h);
  if(activeTab==="steer") renderSteer(cfg, h);
  if(activeTab==="history") renderHistory(cfg, h);
  if(activeTab==="export") renderExport(cfg, h);
}

/* ============================================================
   CHANGELOG — append-only history per config
   ============================================================ */
function logChange(cfg, entry){
  cfg.history = cfg.history || [];
  cfg.history.push({ at: nowIso(), byRole: "self", ...entry });
  // Cap op 1000 entries om localStorage-bloat te voorkomen
  if(cfg.history.length > 1000) cfg.history = cfg.history.slice(-1000);
}

function renderHistory(cfg, h){
  const history = (cfg.history||[]).slice().reverse(); // nieuwste eerst
  if(history.length === 0){
    document.getElementById("tab-history").innerHTML = `
      <p style="font-family:'Fraunces',serif;font-style:italic;font-size:16px;color:#444;margin:0">
        Nog geen wijzigingen gelogd. Wijzig een status in de Controls-tab of pas de configuratie aan; elke wijziging wordt hier append-only bijgehouden.
      </p>`;
    return;
  }

  const rows = history.map(e => {
    const when = e.at.slice(0,10) + " " + e.at.slice(11,16);
    const who = e.byRole || "self";
    let action = "";
    if(e.kind === "create"){
      action = `<b>config aangemaakt</b>`;
    } else if(e.kind === "status"){
      action = `<b>${e.code}</b> · status <code>${esc(e.from||"∅")}</code> → <code>${esc(e.to||"∅")}</code>`;
    } else if(e.kind === "field"){
      const fromT = (e.from||"").toString();
      const toT   = (e.to||"").toString();
      action = `<b>${e.code}</b> · ${esc(e.field)} <code>${esc(fromT.slice(0,30)||"∅")}${fromT.length>30?"…":""}</code> → <code>${esc(toT.slice(0,30)||"∅")}${toT.length>30?"…":""}</code>`;
    } else if(e.kind === "choice"){
      action = `keuze <b>${esc(e.layer)}</b>.${esc(e.field)} → <code>${esc(e.to)}</code>`;
    } else {
      action = esc(e.note||"wijziging");
    }
    return `<tr>
      <td class="hist-when">${when}</td>
      <td class="hist-who">${esc(who)}</td>
      <td class="hist-action">${action}</td>
    </tr>`;
  }).join("");

  document.getElementById("tab-history").innerHTML = `
    <div class="disclaimer"><b>Append-only changelog</b>
      Elke status- of keuze-wijziging wordt gelogd met tijdstempel en rol. De historie wordt bewaard in de config zelf (tot 1000 entries) en gaat mee in JSON-export/import.
    </div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:10px;letter-spacing:.08em">
      ${history.length} entries · oudste ${history[history.length-1].at.slice(0,10)} · laatste ${history[0].at.slice(0,10)}
    </div>
    <table class="hist-table">
      <thead><tr><th>Wanneer</th><th>Rol</th><th>Actie</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

/* ============================================================
   STRIDE — threat-model analyse
   ============================================================ */
function strideAnalyze(cfg, h){
  const byCat = {S:[],T:[],R:[],I:[],D:[],E:[]};
  h.controls.forEach(c => {
    const cats = strideMap[c.code] || [];
    const st = cfg.controlStatus[c.code]?.status || "open";
    cats.forEach(k => byCat[k].push({code:c.code, name:c.name, status:st, gapFlag:c.gapFlag}));
  });
  const summary = {};
  Object.entries(byCat).forEach(([k, list]) => {
    const total = list.length;
    const done  = list.filter(x=>x.status==="done").length;
    const na    = list.filter(x=>x.status==="na").length;
    const risk  = list.filter(x=>x.status==="risk").length;
    const prog  = list.filter(x=>x.status==="prog").length;
    const open  = list.filter(x=>x.status==="open").length;
    const openGaps = list.filter(x=>x.status==="open" && x.gapFlag).length;
    const covered = done + na + risk;
    const cov = total>0 ? covered/total : 1;
    let level;
    if(total===0) level = "na";
    else if(openGaps>0 || cov<0.4) level = "high";
    else if(cov<0.75 || prog>0) level = "med";
    else level = "low";
    summary[k] = { list, total, done, na, risk, prog, open, openGaps, cov, level };
  });
  return summary;
}

function renderStride(cfg, h){
  const s = strideAnalyze(cfg, h);
  const levels = {high:0, med:0, low:0, na:0};
  Object.values(s).forEach(x => levels[x.level]++);

  const heatmap = Object.entries(STRIDE_META).map(([k, meta])=>{
    const cell = s[k];
    const lvl = cell.level;
    return `
      <div class="stride-row" data-k="${k}">
        <div class="str-key">
          <span class="str-letter">${k}</span>
          <div><div class="str-name">${meta.name}</div><div class="str-sub">${meta.sub}</div></div>
        </div>
        <div class="str-cells">
          <div class="str-cell low ${lvl==='low'?'on':''}">LOW</div>
          <div class="str-cell med ${lvl==='med'?'on':''}">MED</div>
          <div class="str-cell high ${lvl==='high'?'on':''}">HIGH</div>
        </div>
        <div class="str-nums">
          <span>${cell.done}/${cell.total}</span>
          <span class="hint">done/total</span>
        </div>
      </div>`;
  }).join("");

  const blocks = Object.entries(STRIDE_META).map(([k, meta])=>{
    const cell = s[k];
    if(cell.total===0) return `
      <div class="stride-block">
        <div class="stride-head"><span class="str-letter">${k}</span><h3>${meta.name}</h3><span class="str-level na">N.V.T.</span></div>
        <p class="str-desc">${meta.desc}</p>
        <p class="str-empty">Geen controls gemapt op deze STRIDE-categorie voor dit harnas.</p>
      </div>`;
    const sortedList = cell.list.slice().sort((a,b)=>{
      const order = {open:0, prog:1, risk:2, na:3, done:4};
      return (order[a.status]||0) - (order[b.status]||0);
    });
    return `
      <div class="stride-block">
        <div class="stride-head">
          <span class="str-letter">${k}</span>
          <h3>${meta.name} <span class="str-subhead">· ${meta.sub}</span></h3>
          <span class="str-level ${cell.level}">${cell.level.toUpperCase()}</span>
        </div>
        <p class="str-desc">${meta.desc}</p>
        <div class="str-stats">
          <span>☑ ${cell.done} done</span>
          <span>◔ ${cell.prog} prog</span>
          <span>☐ ${cell.open} open${cell.openGaps>0?' ⚑':''}</span>
          <span>— ${cell.na} na</span>
          <span>⚠ ${cell.risk} risk</span>
          <span class="hint">· ${Math.round(cell.cov*100)}% afgedekt</span>
        </div>
        <div class="str-ctrls">
          ${sortedList.map(c=>`
            <div class="str-ctrl status-${c.status}${c.gapFlag?' gap':''}">
              <span class="ctrl-code">${c.code}</span>
              <span class="ctrl-name">${c.name}</span>
              <span class="ctrl-tag">${c.status==='open'?'☐':c.status==='prog'?'◔':c.status==='done'?'☑':c.status==='na'?'—':'⚠'}</span>
            </div>`).join("")}
        </div>
      </div>`;
  }).join("");

  document.getElementById("tab-stride").innerHTML = `
    <div class="disclaimer"><b>STRIDE threat model</b>
      Dreigingen per categorie, gemapt op de mitigerende controls uit het harnas. Een STRIDE-categorie is ROOD als openstaande gap-flag-controls of &lt;40% afdekking; ORANJE bij 40-75% of items in uitvoering; GROEN bij ≥75% done/na/risk.
    </div>

    <div class="stride-summary">
      <div class="ss-cell low"><span class="n">${levels.low}</span><span class="l">LOW</span></div>
      <div class="ss-cell med"><span class="n">${levels.med}</span><span class="l">MED</span></div>
      <div class="ss-cell high"><span class="n">${levels.high}</span><span class="l">HIGH</span></div>
      <div class="ss-cell"><span class="n">${levels.na}</span><span class="l">N.V.T.</span></div>
    </div>

    <div class="stride-heatmap">${heatmap}</div>

    <div class="stride-blocks">${blocks}</div>
  `;
}

function steeringFor(cfg, h){
  const s = {soft:[], medium:[], hard:[], org:[]};

    if(!st) return;
    s[st.tier].push({code:c.code, name:c.name, ...st});
  });
  return s;
}

function fillTemplate(tpl, cfg){
  if(!tpl) return tpl;
  return tpl
    .replace(/\{name\}/g, cfg.name||"—")
    .replace(/\{owner\}/g, cfg.owner||"—")
    .replace(/\{dpo\}/g, cfg.dpo||"—")
    .replace(/\{ciso\}/g, cfg.ciso||"—")
    .replace(/\{purpose\}/g, cfg.purpose||"—")
    .replace(/\{aiActClass\}/g, cfg.aiActClass||"—")
    .replace(/\{id\}/g, cfg.id||"—");
}

function buildHooks(cfg, h){
  const s = steeringFor(cfg, h);
  const grouped = {};
  s.medium.forEach(x => {
    if(!x.hook) return;
    const ev = x.hook.event;
    (grouped[ev] = grouped[ev] || []).push(x);
  });

  const hooksObj = { hooks: {} };
  Object.entries(grouped).forEach(([event, list]) => {
    hooksObj.hooks[event] = list.map(x => ({
      _harnas_control: x.code,
      _harnas_purpose: x.hook.purpose,
      matcher: x.hook.matcher || "*",
      hooks: [{
        type: "command",
        command: hookCommandFor(x, cfg)
      }]
    }));
  });
  return JSON.stringify(hooksObj, null, 2);
}

function hookCommandFor(x, cfg){
  // Sjabloon-commando's — gebruiker past aan voor eigen omgeving
  const id = cfg.id;
  switch(x.code){
    case "T.02": return `# T.02 HITL — vraag bevestiging\necho \"⚠ HITL: confirm voor ${'$'}{TOOL_NAME} (harnas ${id})\" >&2; exit 2`;
    case "I.02": return `# I.02 prompt-injection — scan input op verdachte patronen\nnode \"$HOME/.claude/hooks/scan-injection.js\" --config ${id}`;
    case "I.03": return `# I.03 output-DLP — strip credentials/PII uit tool-output\nnode \"$HOME/.claude/hooks/dlp-scan.js\" --config ${id}`;
    case "I.06": return `# I.06 sandbox — controleer permission-mode\ntest \"${'$'}{PERMISSION_MODE}\" = \"plan\" || echo \"⚠ I.06: permission-mode niet 'plan'\" >&2`;
    case "A.01": return `# A.01 audit-log — append prompt+response\necho \"$(date -u +%FT%TZ) ${id} ${'$'}{TOOL_NAME}\" >> \"$HOME/.claude/audit-log/${id}.jsonl\"`;
    case "A.02": return `# A.02 audittrail — git-status check op .claude wijzigingen\ngit -C \"$HOME/.claude\" status --short`;
    case "D.03": return `# D.03 PII-redaction op input\nnode \"$HOME/.claude/hooks/pii-strip.js\" --config ${id}`;
    case "D.06": return `# D.06 retentie — archiveer transcript\ncp \"${'$'}{TRANSCRIPT_PATH}\" \"$HOME/Archief/AI-sessies/$(date +%F)-${id}.jsonl\" 2>/dev/null || true`;
    case "M.04": return `# M.04 prompt change-mgmt — reminder bij Edit op .claude\necho \"$(date) M.04: wijziging in .claude/ — commit met motivatie?\" >&2`;
    default:    return `# ${x.code} — sjabloon, vul zelf in\necho \"hook ${x.code} voor harnas ${id}\"`;
  }
}

function copyText(text, msg){
  navigator.clipboard.writeText(text).then(()=>alert(msg||"Gekopieerd"));
}
function downloadText(text, name, mime){
  const blob = new Blob([text], {type:mime||"text/plain"});
  downloadBlob(blob, name);
}
async function downloadActive(){
  const cfg = state.configs[state.activeId];
  const signed = { ...cfg, _integrity: await computeHash(cfg) };
  const blob = new Blob([JSON.stringify(signed, null, 2)], {type:"application/json"});
  downloadBlob(blob, "ACTIVE.json");
}
async function saveActiveFsa(){
  const cfg = state.configs[state.activeId];
  const signed = { ...cfg, _integrity: await computeHash(cfg) };
  try{
    const handle = await window.showSaveFilePicker({
      suggestedName: "ACTIVE.json",
      types: [{description:"Harnas-config", accept:{"application/json":[".json"]}}]
    });
    const w = await handle.createWritable();
    await w.write(JSON.stringify(signed, null, 2));
    await w.close();
    alert("ACTIVE.json opgeslagen (met integriteit-hash) — /harnas-check vindt 'm nu.");
  }catch(e){
    if(e.name !== "AbortError") alert("Opslaan mislukt: "+e.message);
  }
}

function renderControls(cfg, h){
  const filtered = h.controls.filter(c =>
    c.fw.some(f => state.fwFilter.includes(f))
  );

  const chips = ["AVG","DORA","Cbw","AIAct"].map(fw=>
    `<div class="chip ${state.fwFilter.includes(fw)?"":"off"}" data-fw="${fw}"><span class="dot"></span>${fw==="Cbw"?"Cbw/NIS2":fw}</div>`
  ).join("");

  // Group by H-layer
  const groups = {};
  filtered.forEach(c => { (groups[c.layer]=groups[c.layer]||[]).push(c); });

  const html = Object.entries(HARNAS_LAYERS).map(([key, L])=>{
    const list = groups[key] || [];
    if(list.length===0) return "";
    return `<div class="h-group">
      <h3>${L.title} <span class="hcount">${list.length} control${list.length===1?"":"s"}</span></h3>
      <div class="hdesc">${L.sub}</div>
      ${list.map(c => renderCtrlRow(cfg, c)).join("")}
    </div>`;
  }).join("");

  document.getElementById("tab-controls").innerHTML = `
    <div class="ctrl-filters">
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;padding:6px 8px 6px 0">Filter op kader:</span>
      ${chips}
      <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);padding:6px 0">${filtered.length}/${h.controls.length} controls zichtbaar</span>
    </div>
    ${html || '<p style="font-style:italic;color:var(--muted)">Geen controls binnen dit filter.</p>'}
  `;

  // Bind chip clicks
  document.querySelectorAll("#tab-controls .chip").forEach(ch=>{
    ch.addEventListener("click",()=>{
      const fw = ch.dataset.fw;
      const idx = state.fwFilter.indexOf(fw);
      if(idx>=0) state.fwFilter.splice(idx,1);
      else state.fwFilter.push(fw);
      saveState(); renderDashboard();
    });
  });
  // Bind status controls
  document.querySelectorAll("#tab-controls .ctrl-status").forEach(box=>{
    const code = box.dataset.code;
    box.querySelectorAll("select, input").forEach(el=>{
      el.addEventListener("change",()=>{
        const cur = cfg.controlStatus[code] || {};
        const field = el.dataset.field;
        const oldVal = cur[field];
        const newVal = el.value;
        if(oldVal === newVal) return;
        cur[field] = newVal;
        if(field==="status" && newVal && newVal!=="open" && !cur.date) cur.date = nowDate();
        cfg.controlStatus[code] = cur;
        cfg.modified = nowIso();
        // Log de wijziging
        logChange(cfg, field==="status"
          ? { kind:"status", code, from:oldVal, to:newVal }
          : { kind:"field", code, field, from:oldVal, to:newVal });
        saveState();
        // Update the select's data-v for styling
        if(field==="status") el.setAttribute("data-v", el.value);
        // Lightweight re-render of sidebar open-count only
        const openCount = generateHarnas(cfg).controls.filter(x=>{
          return (cfg.controlStatus[x.code]?.status || "open") === "open";
        }).length;
        const sideItem = document.querySelector(`.side-item[data-id="${cfg.id}"] .si-meta`);
        if(sideItem) sideItem.textContent = sideItem.textContent.replace(/\d+ open/, `${openCount} open`);
      });
    });
  });
}

function buildMarkdown(cfg, h){
  const lines = [];
  lines.push("---");
  lines.push(`title: Compliance-Harnas – ${cfg.name}`);
  lines.push(`owner: ${cfg.owner}`);
  lines.push(`dpo: ${cfg.dpo || "—"}`);
  lines.push(`ciso: ${cfg.ciso || "—"}`);
  lines.push(`ai_act_class: ${cfg.aiActClass}`);
  lines.push(`carrier: ${h.carrier}`);
  lines.push(`created: ${cfg.created.slice(0,10)}`);
  lines.push(`modified: ${cfg.modified.slice(0,10)}`);
  lines.push(`controls: ${h.controls.length}`);
  lines.push(`triggers: ${h.triggers.length}`);
  lines.push("---\n");
  lines.push(`# Compliance-Harnas — ${cfg.name}\n`);
  lines.push(`> ${cfg.purpose}\n`);
  lines.push(`## Configuratie\n`);
  lines.push(`| Laag | Keuze |\n|---|---|`);
  lines.push(`| L04 Applicatie | ${aucx.L04.invul.find(x=>x.id===cfg.L04.app)?.name} · ${aucx.L04.promptInvul.find(x=>x.id===cfg.L04.prompts)?.name}${cfg.L04.agents?" · agents":""} |`);
  lines.push(`| L03 Data | ${aucx.L03.invul.find(x=>x.id===cfg.L03.scope)?.name} · ${aucx.L03.pgInvul.find(x=>x.id===cfg.L03.pg)?.name}${cfg.L03.confidential?" · vertrouwelijk":""} |`);
  lines.push(`| L02 Model | ${aucx.L02.invul.find(x=>x.id===cfg.L02.model)?.name} · ${aucx.L02.ftInvul.find(x=>x.id===cfg.L02.finetune)?.name} |`);
  lines.push(`| L01 Infra | ${aucx.L01.invul.find(x=>x.id===cfg.L01.infra)?.name} |`);
  lines.push("");
  if(h.triggers.length>0){
    lines.push(`## AI Act-triggers & gap-flags\n`);
    h.triggers.forEach(t=>{
      lines.push(`### ⚑ ${t.title}`);
      lines.push(`*${t.ref}*\n`);
      lines.push(`${t.desc}\n`);
      lines.push(`Activeert: ${t.ctrl.map(c=>"`"+c+"`").join(", ")}\n`);
    });
  }

  // STRIDE threat model
  const stride = strideAnalyze(cfg, h);
  const levels = {high:0, med:0, low:0, na:0};
  Object.values(stride).forEach(x => levels[x.level]++);
  lines.push(`## STRIDE threat model\n`);
  lines.push(`**Samenvatting:** ${levels.high} HIGH · ${levels.med} MED · ${levels.low} LOW · ${levels.na} n.v.t.\n`);
  lines.push(`| STRIDE | Level | Done | Open | Afdekking | Dreiging |`);
  lines.push(`|---|---|---|---|---|---|`);
  Object.entries(STRIDE_META).forEach(([k, meta])=>{
    const cell = stride[k];
    const lvl = cell.level === "na" ? "n.v.t." : cell.level.toUpperCase();
    const cov = cell.total > 0 ? Math.round(cell.cov*100) + "%" : "—";
    lines.push(`| **${k}** ${meta.name} | ${lvl} | ${cell.done}/${cell.total} | ${cell.open}${cell.openGaps>0?" ⚑":""} | ${cov} | ${meta.sub} |`);
  });
  lines.push("");
  Object.entries(STRIDE_META).forEach(([k, meta])=>{
    const cell = stride[k];
    if(cell.total === 0) return;
    lines.push(`### ${k} · ${meta.name} — ${cell.level.toUpperCase()}`);
    lines.push(`*${meta.desc}*\n`);
    const sortedList = cell.list.slice().sort((a,b)=>{
      const order = {open:0, prog:1, risk:2, na:3, done:4};
      return (order[a.status]||0) - (order[b.status]||0);
    });
    sortedList.forEach(c => {
      const icon = c.status==='open'?'☐':c.status==='prog'?'◔':c.status==='done'?'☑':c.status==='na'?'—':'⚠';
      const gap = c.gapFlag ? " ⚑" : "";
      lines.push(`- ${icon} \`${c.code}\`${gap} — ${c.name} *(${c.status})*`);
    });
    lines.push("");
  });

  lines.push(`## Controls (${h.controls.length})\n`);
  Object.entries(HARNAS_LAYERS).forEach(([key,L])=>{
    const list = h.controls.filter(c=>c.layer===key);
    if(list.length===0) return;
    lines.push(`### ${L.title} (${list.length})\n`);
    list.forEach(c=>{
      const st = cfg.controlStatus[c.code] || {};
      const box = st.status==="done" ? "[x]" : st.status==="na" ? "[-]" : "[ ]";
      const status = st.status || "open";
      const meta = [
        `status: **${status}**`,
        st.owner ? `eigenaar: ${st.owner}` : null,
        st.date ? `datum: ${st.date}` : null,
        st.evidence ? `evidence: ${st.evidence}` : null
      ].filter(Boolean).join(" · ");
      lines.push(`- ${box} **${c.code}** — ${c.name}${c.gapFlag?" ⚑":""}`);
      lines.push(`    - ${c.desc}`);
      lines.push(`    - kaders: ${c.fw.join(", ")}${c.cbwRef.length?" · CBW: "+c.cbwRef.map(b=>b.id).join(","):""}${c.digidRef.length?" · DigiD: "+c.digidRef.map(n=>n.split(" ")[0]).join(","):""}`);
      lines.push(`    - getriggerd door: ${c.triggeredBy.join(" · ")}`);
      if(meta) lines.push(`    - ${meta}`);
      if(st.note) lines.push(`    - *${st.note}*`);
    });
    lines.push("");
  });
  lines.push(`---\n*Gegenereerd ${nowDate()} met Compliance-Harnas Configurator v1.0 · AuCx*`);
  return lines.join("\n");
}

function buildStrideMarkdown(cfg, h){
  const stride = strideAnalyze(cfg, h);
  const levels = {high:0, med:0, low:0, na:0};
  Object.values(stride).forEach(x => levels[x.level]++);
  const lines = [];
  lines.push("---");
  lines.push(`title: STRIDE Threat Model – ${cfg.name}`);
  lines.push(`framework: STRIDE`);
  lines.push(`owner: ${cfg.owner}`);
  lines.push(`date: ${nowDate()}`);
  lines.push(`high: ${levels.high}`);
  lines.push(`med: ${levels.med}`);
  lines.push(`low: ${levels.low}`);
  lines.push("---\n");
  lines.push(`# STRIDE Threat Model — ${cfg.name}\n`);
  lines.push(`**Use-case:** ${cfg.purpose}\n`);
  lines.push(`**Eigenaar:** ${cfg.owner} · **Datum:** ${nowDate()}\n`);
  lines.push(`## Samenvatting\n`);
  lines.push(`**${levels.high}** HIGH · **${levels.med}** MED · **${levels.low}** LOW · **${levels.na}** n.v.t.\n`);
  lines.push(`| STRIDE | Categorie | Level | Done | Open | Afdekking |`);
  lines.push(`|---|---|---|---|---|---|`);
  Object.entries(STRIDE_META).forEach(([k, meta])=>{
    const cell = stride[k];
    const lvl = cell.level === "na" ? "n.v.t." : cell.level.toUpperCase();
    const cov = cell.total > 0 ? Math.round(cell.cov*100) + "%" : "—";
    lines.push(`| **${k}** | ${meta.name} (${meta.sub}) | ${lvl} | ${cell.done}/${cell.total} | ${cell.open}${cell.openGaps>0?" ⚑":""} | ${cov} |`);
  });
  lines.push("");

  // Detail per categorie
  Object.entries(STRIDE_META).forEach(([k, meta])=>{
    const cell = stride[k];
    if(cell.total === 0){
      lines.push(`## ${k} · ${meta.name} — N.V.T.`);
      lines.push(`*${meta.desc}*\n`);
      lines.push(`Geen controls gemapt op deze categorie voor dit harnas.\n`);
      return;
    }
    lines.push(`## ${k} · ${meta.name} — ${cell.level.toUpperCase()}`);
    lines.push(`*${meta.sub} — ${meta.desc}*\n`);
    lines.push(`**Stats:** ${cell.done} done · ${cell.prog} in uitvoering · ${cell.open} open${cell.openGaps>0?' (waarvan '+cell.openGaps+' met gap-flag ⚑)':''} · ${cell.na} n.v.t. · ${cell.risk} geaccepteerd risico · ${Math.round(cell.cov*100)}% afgedekt\n`);
    const sortedList = cell.list.slice().sort((a,b)=>{
      const order = {open:0, prog:1, risk:2, na:3, done:4};
      return (order[a.status]||0) - (order[b.status]||0);
    });
    lines.push(`### Mitigerende controls\n`);
    sortedList.forEach(c => {
      const st = cfg.controlStatus[c.code] || {};
      const icon = c.status==='open'?'☐':c.status==='prog'?'◔':c.status==='done'?'☑':c.status==='na'?'—':'⚠';
      const gap = c.gapFlag ? " ⚑" : "";
      const meta2 = [
        st.owner ? `eigenaar: ${st.owner}` : null,
        st.date ? `datum: ${st.date}` : null,
        st.evidence ? `evidence: ${st.evidence}` : null
      ].filter(Boolean).join(" · ");
      lines.push(`- ${icon} **${c.code}**${gap} — ${c.name} *(${c.status})*`);
      if(meta2) lines.push(`    - ${meta2}`);
      if(st.note) lines.push(`    - *${st.note}*`);
    });
    lines.push("");
  });

  // Prio-lijst
  const openHighCats = Object.entries(stride).filter(([k,c]) => c.level==="high").map(([k])=>k);
  if(openHighCats.length > 0){
    lines.push(`## Top-prioriteiten — HIGH-risk STRIDE-categorieën\n`);
    openHighCats.forEach(k => {
      const meta = STRIDE_META[k];
      const cell = stride[k];
      const openItems = cell.list.filter(x=>x.status==="open").map(x=>"`"+x.code+"` "+x.name).join(", ");
      lines.push(`- **${k} · ${meta.name}** — sluit eerst: ${openItems || '(geen openstaande items, maar lage afdekking)'}`);
    });
    lines.push("");
  }

  lines.push(`---\n*Gegenereerd ${nowDate()} met Compliance-Harnas Configurator v1.0 · AuCx · config-id: ${cfg.id}*`);
  return lines.join("\n");
}

function downloadBlob(blob, name){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 100);
}
function importJSON(file){
  if(file.size > 2 * 1024 * 1024){ alert("Bestand te groot (>2MB). Afgebroken."); return; }
  const r = new FileReader();
  r.onload = async () => {
    let cfg;
    try{ cfg = JSON.parse(r.result); }
    catch(e){ alert("Kon JSON niet lezen: "+e.message); return; }

    // 1. Schema-validatie
    const { ok, errors } = validateConfig(cfg);
    if(!ok){
      alert("Import geweigerd — schema-fouten:\n\n" + errors.slice(0,10).join("\n") + (errors.length>10?`\n…en ${errors.length-10} meer`:""));
      return;
    }

    // 2. Integriteit-check
    let integrityMsg = "";
    if(cfg._integrity){
      const expected = cfg._integrity;
      const actual = await computeHash(cfg);
      if(expected === actual){
        integrityMsg = "\n\n✓ Integriteit-hash matcht.";
      } else {
        if(!confirm(`⚠ Integriteit-hash komt niet overeen!\n\nHet bestand lijkt gewijzigd sinds export.\nVerwacht: ${expected.slice(0,16)}…\nBerekend: ${actual.slice(0,16)}…\n\nToch importeren?`)) return;
        integrityMsg = "\n\n⚠ Hash-mismatch genegeerd.";
      }
    } else {
      integrityMsg = "\n\n(geen _integrity-veld — bestand ongesigneerd)";
    }

    // 3. Conflict
    if(state.configs[cfg.id] && !confirm(`Config '${cfg.name}' bestaat al. Overschrijven?` + integrityMsg)) return;

    // 4. Strip integrity + load
    delete cfg._integrity;
    cfg.modified = nowIso();
    state.configs[cfg.id] = cfg;
    state.activeId = cfg.id;
    saveState();
    switchView("dashboard");
    renderDashboard();
  };
  r.readAsText(file);
}

  document.getElementById("topTools").classList.toggle("hidden", name==="wizard");

  const c = state.configs[state.activeId];
